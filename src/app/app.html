@if (deveExibirPainel()) {
  <div class="container-principal">

    <aside class="menu-lateral">
      <div class="logo-container">
       <img src="/logo-sorriso.png" alt="Logo Alquimia" class="logo-imagem">
        <h1 class="logo">
          Alquimia
        </h1>
        <span class="subtitulo-logo">
          Face & Sorriso
        </span>
      </div>

      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/consultas" routerLinkActive="active">Consultas</a>
      <a routerLink="/pacientes" routerLinkActive="active">Pacientes</a>
      <a routerLink="/dentistas" routerLinkActive="active">Dentistas</a>
      <a routerLink="/especialidades" routerLinkActive="active">Especialidades</a>
      <a routerLink="/relatorios" routerLinkActive="active">Relatórios</a>

      @if (usuarioLogado?.perfil === 'ADMIN') {
        <a routerLink="/usuarios" routerLinkActive="active">Usuários</a>
      }
    </aside>

    <main class="conteudo-principal">
      <div class="topbar">
       <div class="info-topo">
        <span class="dica">💡 {{ dicaDoDia }}</span>
        <span class="horario">🕒 {{ horarioAtual }}</span>
      </div>
        <div class="usuario" (click)="sair()" style="cursor: pointer;" title="Clique para sair">
          {{ usuarioLogado?.nome }} (Sair)
        </div>
      </div>

      <router-outlet></router-outlet>

    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}

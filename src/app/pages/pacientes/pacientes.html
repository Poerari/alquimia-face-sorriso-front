<h1>Pacientes</h1>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>CPF</th>
      <th>Email</th>
      <th>Telefone</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let paciente of pacientes">
      <td>{{ paciente.id }}</td>
      <td>{{ paciente.nome }}</td>
      <td>{{ paciente.cpf }}</td>
      <td>{{ paciente.email }}</td>
      <td>{{ paciente.telefone }}</td>
    </tr>
  </tbody>
</table>

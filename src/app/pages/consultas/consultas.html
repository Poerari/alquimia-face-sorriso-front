<div class="pagina">

  <div class="pagina">

  <div class="cabecalho-pagina">
    <h1>Consultas</h1>
    <button class="btn-nova">Nova Consulta</button>
  </div>

  <div class="card-tabela">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Paciente</th>
          <th>Dentista</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (consulta of consultas; track consulta.id) {
          <tr>
            <td>{{ consulta.id }}</td>
            <td>{{ consulta.paciente?.nome }}</td>
            <td>{{ consulta.dentista?.nome }}</td>
            <td>
              <span class="status">
                {{ consulta.status }}
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" style="text-align: center; padding: 20px;">
              Nenhuma consulta encontrada na lista.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>

</div>
